server.port=${PORT:8080}

# PostgreSQL
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/demo}
spring.datasource.username=${DATABASE_USER:postgres}
spring.datasource.password=${DATABASE_PASSWORD:postgres}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false

# Kafka
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
spring.kafka.consumer.group-id=runix-demo
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.apache.kafka.common.serialization.StringSerializer

# S3 / MinIO
s3.endpoint=${S3_ENDPOINT:http://localhost:9000}
s3.access-key=${S3_ACCESS_KEY:minioadmin}
s3.secret-key=${S3_SECRET_KEY:minioadmin}
s3.bucket=${S3_BUCKET:uploads}
s3.region=${S3_REGION:us-east-1}

# Actuator
management.endpoints.web.exposure.include=health

# Thymeleaf
spring.thymeleaf.cache=false

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<!-- Reusable <head> fragment -->
<head th:fragment="head(title)">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${title}">Runix Demo</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0a0a0a; color: #e5e5e5; min-height: 100vh; }
        a { color: #60a5fa; text-decoration: none; }
        a:hover { text-decoration: underline; }

        .nav { background: #111; border-bottom: 1px solid #222; padding: 0 2rem; display: flex; align-items: center; height: 56px; gap: 2rem; }
        .nav-brand { font-weight: 700; font-size: 1.1rem; color: #fff; display: flex; align-items: center; gap: .5rem; }
        .nav-brand span { background: linear-gradient(135deg, #6366f1, #8b5cf6); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .nav-links { display: flex; gap: .25rem; }
        .nav-links a { padding: .5rem 1rem; border-radius: 6px; color: #999; font-size: .875rem; transition: all .15s; }
        .nav-links a:hover { background: #1a1a1a; color: #fff; text-decoration: none; }
        .nav-links a.active { background: #1f1f1f; color: #fff; }

        .container { max-width: 1000px; margin: 0 auto; padding: 2rem; }

        .alert { padding: .75rem 1rem; border-radius: 8px; margin-bottom: 1.5rem; font-size: .875rem; }
        .alert-success { background: #052e16; border: 1px solid #166534; color: #4ade80; }
        .alert-error { background: #2a0a0a; border: 1px solid #7f1d1d; color: #f87171; }

        .card { background: #111; border: 1px solid #222; border-radius: 12px; padding: 1.5rem; margin-bottom: 1.5rem; }
        .card h2 { font-size: 1.1rem; margin-bottom: 1rem; color: #fff; }

        .badge { display: inline-flex; align-items: center; gap: .35rem; padding: .25rem .75rem; border-radius: 20px; font-size: .75rem; font-weight: 600; }
        .badge-green { background: #052e16; color: #4ade80; border: 1px solid #166534; }
        .badge-red { background: #2a0a0a; color: #f87171; border: 1px solid #7f1d1d; }
        .badge-blue { background: #0c1f3d; color: #60a5fa; border: 1px solid #1e3a5f; }
        .badge-purple { background: #1a0a2e; color: #a78bfa; border: 1px solid #3b1f6e; }

        .dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
        .dot-green { background: #4ade80; }
        .dot-red { background: #f87171; }

        input[type="text"], textarea { width: 100%; padding: .6rem .8rem; background: #0a0a0a; border: 1px solid #333; border-radius: 8px; color: #e5e5e5; font-size: .875rem; font-family: inherit; }
        input[type="text"]:focus, textarea:focus { outline: none; border-color: #6366f1; }
        textarea { resize: vertical; min-height: 80px; }

        .btn { display: inline-flex; align-items: center; gap: .4rem; padding: .55rem 1.1rem; border: none; border-radius: 8px; font-size: .8rem; font-weight: 600; cursor: pointer; transition: all .15s; }
        .btn-primary { background: #6366f1; color: #fff; }
        .btn-primary:hover { background: #4f46e5; }
        .btn-danger { background: #7f1d1d; color: #f87171; }
        .btn-danger:hover { background: #991b1b; }
        .btn-sm { padding: .35rem .7rem; font-size: .75rem; }

        .form-group { margin-bottom: 1rem; }
        .form-group label { display: block; font-size: .8rem; color: #999; margin-bottom: .35rem; font-weight: 500; }

        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; font-size: .75rem; color: #666; text-transform: uppercase; letter-spacing: .05em; padding: .5rem; border-bottom: 1px solid #222; }
        td { padding: .65rem .5rem; border-bottom: 1px solid #1a1a1a; font-size: .875rem; }

        .grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1rem; }
        .stat-card { background: #111; border: 1px solid #222; border-radius: 12px; padding: 1.25rem; text-align: center; }
        .stat-card .stat-value { font-size: 2rem; font-weight: 700; color: #fff; }
        .stat-card .stat-label { font-size: .75rem; color: #666; margin-top: .25rem; text-transform: uppercase; letter-spacing: .05em; }

        .tag-sent { color: #60a5fa; }
        .tag-received { color: #4ade80; }

        .empty { text-align: center; padding: 2rem; color: #555; font-size: .9rem; }

        @media (max-width: 640px) {
            .grid-3 { grid-template-columns: 1fr; }
            .nav { padding: 0 1rem; gap: 1rem; }
            .container { padding: 1rem; }
        }
    </style>
</head>

<body>
<!-- Reusable nav fragment -->
<nav th:fragment="nav" class="nav">
    <div class="nav-brand"><span>Runix</span> Demo</div>
    <div class="nav-links">
        <a href="/">Dashboard</a>
        <a href="/notes">Notes</a>
        <a href="/kafka">Kafka</a>
        <a href="/files">Files</a>
    </div>
</nav>
<script th:fragment="navscript">
    document.querySelectorAll('.nav-links a').forEach(function(a) {
        if (a.pathname === '/' ? location.pathname === '/' : location.pathname.startsWith(a.pathname)) {
            a.classList.add('active');
        }
    });
</script>
</body>
</html>

<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout :: head('Files — Runix Demo')}"></head>
<body>
<nav th:replace="~{layout :: nav}"></nav>
<div class="container">

    <h1 style="font-size: 1.5rem; margin-bottom: .25rem; color: #fff;">S3 Object Storage</h1>
    <p style="color: #666; margin-bottom: 1.5rem; font-size: .85rem;">
        Files stored in <span class="badge badge-purple" style="font-size:.7rem;">MinIO (S3-compatible)</span>
        &middot;
        <span th:if="${available}" class="badge badge-green" style="font-size:.7rem;"><span class="dot dot-green"></span> Connected</span>
        <span th:unless="${available}" class="badge badge-red" style="font-size:.7rem;"><span class="dot dot-red"></span> Disconnected</span>
    </p>

    <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
    <div th:if="${error}" class="alert alert-error" th:text="${error}"></div>

    <!-- Upload form -->
    <div class="card">
        <h2>Upload File</h2>
        <form action="/files/upload" method="post" enctype="multipart/form-data"
              style="display:flex;gap:.75rem;align-items:flex-end;">
            <div class="form-group" style="flex:1;margin-bottom:0;">
                <label>Choose a file</label>
                <input type="file" name="file" required style="color:#999;font-size:.85rem;">
            </div>
            <button type="submit" class="btn btn-primary" style="background:#d97706;height:38px;">Upload to S3</button>
        </form>
    </div>

    <!-- File list -->
    <div class="card">
        <h2>Bucket Contents</h2>
        <div th:if="${#lists.isEmpty(files)}" class="empty">Bucket is empty. Upload a file!</div>
        <table th:unless="${#lists.isEmpty(files)}">
            <thead>
                <tr><th>Object Key</th><th></th></tr>
            </thead>
            <tbody>
                <tr th:each="file : ${files}">
                    <td style="font-family:monospace;font-size:.85rem;color:#e5e5e5;" th:text="${file}"></td>
                    <td style="text-align:right;">
                        <form th:action="'/files/' + ${file} + '/delete'" method="post" style="margin:0;">
                            <button class="btn btn-danger btn-sm" type="submit">Delete</button>
                        </form>
                    </td>
                </tr>
            </tbody>
        </table>
    </div>

</div>
</body>
</html>
